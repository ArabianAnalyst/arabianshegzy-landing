<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 500px; height: 116px;
    background: #080808;
    display: flex; align-items: center;
    padding: 0 20px;
    overflow: hidden;
  }
  .logo {
    font-family: 'Syne', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -3px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .arrow { color: #E8D832; }
  .name  { color: #EDEAE3; }
</style>
</head>
<body>
  <div class="logo">
    <span class="arrow">▸</span><span class="name">ARABA</span>
  </div>
</body>
</html>
