<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #080808;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #080808;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 100px;
    overflow: hidden;
  }

  /* Grain texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
  }

  /* Yellow top bar */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 360px;
    height: 3px;
    background: #E8D832;
    z-index: 2;
  }

  /* Vertical grid lines */
  .vline {
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: #1C1C1C;
    z-index: 0;
  }

  /* Right surface */
  .right-block {
    position: absolute;
    right: 0;
    top: 0;
    width: 440px;
    height: 100%;
    background: #0F0F0F;
    border-left: 1px solid #1C1C1C;
    z-index: 0;
  }

  /* Yellow pulse dot */
  .dot {
    position: absolute;
    top: 50%;
    right: 218px;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E8D832;
    z-index: 2;
  }

  /* Main content left */
  .content {
    position: relative;
    z-index: 2;
    flex: 1;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #E8D832;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .label::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: #E8D832;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 112px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: #EDEAE3;
    margin-bottom: 28px;
  }

  .name .accent {
    color: #E8D832;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    color: #666666;
    letter-spacing: 0.01em;
    line-height: 1.5;
  }

  .tagline strong {
    color: #EDEAE3;
    font-weight: 500;
  }

  /* Right column */
  .right {
    position: relative;
    z-index: 2;
    width: 380px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 20px;
    padding-left: 40px;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #2a2a2a;
  }

  .mwp-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #E8D832;
    background: rgba(232, 216, 50, 0.06);
    border: 1px solid rgba(232, 216, 50, 0.18);
    padding: 7px 16px;
    border-radius: 3px;
  }

  .site {
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #EDEAE3;
  }

  .location {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: #2a2a2a;
    text-transform: uppercase;
  }

  /* Bottom left marker */
  .bottom-label {
    position: absolute;
    bottom: 28px;
    left: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1C1C1C;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="top-bar"></div>
  <div class="right-block"></div>
  <div class="vline" style="right: 440px;"></div>
  <div class="vline" style="right: 760px;"></div>
  <div class="dot"></div>

  <div class="content">
    <div class="label">AI Creative Operator</div>
    <div class="name">AR<span class="accent">A</span>BA</div>
    <div class="tagline">
      <strong>27 workspaces. 5 pipelines. 0 employees.</strong><br>
      One operator. Built with AI. Lagos.
    </div>
  </div>

  <div class="right">
    <div class="handle">@Olurabian</div>
    <div class="mwp-tag">Model Workspace Protocol</div>
    <div class="site">olurabian.com</div>
    <div class="location">Lagos, Nigeria</div>
  </div>

  <div class="bottom-label">MWP — 2026</div>
</div>
</body>
</html>
