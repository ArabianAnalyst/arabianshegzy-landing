<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #080808;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #080808;
    position: relative;
    overflow: hidden;
  }

  /* Grain texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
  }

  /* Vertical grid lines */
  .vline {
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: #1C1C1C;
    z-index: 0;
  }

  /* Left dead zone — Twitter profile photo covers ~280px bottom-left */
  .left-zone {
    position: absolute;
    left: 0;
    top: 0;
    width: 280px;
    height: 100%;
    background: #080808;
    z-index: 0;
  }

  /* Yellow top bar — spans center zone */
  .top-bar {
    position: absolute;
    top: 0;
    left: 280px;
    width: 900px;
    height: 3px;
    background: #E8D832;
    z-index: 2;
  }

  /* Center content block — safe zone: 280px to 1180px */
  .center {
    position: absolute;
    left: 280px;
    top: 0;
    width: 900px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    z-index: 2;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #E8D832;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .label::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: #E8D832;
    flex-shrink: 0;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 140px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: #EDEAE3;
    margin-bottom: 26px;
  }

  .name .accent {
    color: #E8D832;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    color: #666666;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .tagline .sep {
    color: #2a2a2a;
    margin: 0 14px;
  }

  /* Right zone */
  .right-zone {
    position: absolute;
    right: 0;
    top: 0;
    width: 320px;
    height: 100%;
    background: #0F0F0F;
    border-left: 1px solid #1C1C1C;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    padding: 0 40px;
    gap: 22px;
    z-index: 2;
  }

  .mwp-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #E8D832;
    background: rgba(232, 216, 50, 0.06);
    border: 1px solid rgba(232, 216, 50, 0.18);
    padding: 7px 12px;
    border-radius: 3px;
    text-align: right;
    line-height: 1.6;
  }

  .site {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #EDEAE3;
    letter-spacing: 0.01em;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #383838;
  }

  .location {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: #2a2a2a;
    text-transform: uppercase;
  }

  /* Yellow dot at center/right boundary */
  .dot {
    position: absolute;
    top: 50%;
    left: 1179px;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E8D832;
    z-index: 3;
  }
</style>
</head>
<body>
<div class="banner">

  <!-- Structure -->
  <div class="left-zone"></div>
  <div class="vline" style="left: 280px;"></div>
  <div class="vline" style="left: 580px;"></div>
  <div class="vline" style="left: 880px;"></div>
  <div class="top-bar"></div>
  <div class="dot"></div>

  <!-- Center: safe zone content -->
  <div class="center">
    <div class="label">AI Creative Operator</div>
    <div class="name">AR<span class="accent">A</span>BA</div>
    <div class="tagline">
      One operator.<span class="sep">·</span>Full-stack output.<span class="sep">·</span>Ships in days.
    </div>
  </div>

  <!-- Right zone -->
  <div class="right-zone">
    <div class="mwp-tag">Model Workspace<br>Protocol</div>
    <div class="site">olurabian.com</div>
    <div class="handle">@Olurabian</div>
    <div class="location">Lagos, Nigeria</div>
  </div>

</div>
</body>
</html>
