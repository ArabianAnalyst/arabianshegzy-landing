<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #080808;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #080808;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 100px;
    overflow: hidden;
  }

  /* Grain texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
  }

  /* Background accent line */
  .bg-line {
    position: absolute;
    top: 0;
    right: 340px;
    width: 1px;
    height: 100%;
    background: #1C1C1C;
    z-index: 0;
  }

  .bg-line-2 {
    position: absolute;
    top: 0;
    right: 680px;
    width: 1px;
    height: 100%;
    background: #1C1C1C;
    z-index: 0;
  }

  /* Yellow top bar */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 420px;
    height: 3px;
    background: #E8D832;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 2;
    flex: 1;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #E8D832;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .label::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: #E8D832;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 88px;
    line-height: 0.88;
    letter-spacing: -0.04em;
    color: #EDEAE3;
    margin-bottom: 28px;
  }

  .headline .accent {
    color: #E8D832;
  }

  .sub {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    color: #666666;
    line-height: 1.5;
    max-width: 480px;
  }

  /* Right side */
  .right {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    flex-shrink: 0;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #383838;
  }

  .tech-stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }

  .tech-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #2a2a2a;
    background: #0F0F0F;
    border: 1px solid #1C1C1C;
    padding: 5px 12px;
    border-radius: 3px;
  }

  .cta-pill {
    margin-top: 12px;
    background: #E8D832;
    color: #080808;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="top-bar"></div>
  <div class="bg-line"></div>
  <div class="bg-line-2"></div>

  <div class="content">
    <div class="label">Actionable AI</div>
    <div class="headline">
      I Build It.<br>
      <span class="accent">I Teach It.</span>
    </div>
    <div class="sub">Helping business owners automate with AI.</div>
  </div>

  <div class="right">
    <div class="handle">@Olurabian</div>
    <div class="tech-stack">
      <div class="tech-item">Python</div>
      <div class="tech-item">LangChain</div>
      <div class="tech-item">n8n</div>
      <div class="tech-item">OpenAI API</div>
    </div>
    <div class="cta-pill">arabianshegzy.com</div>
  </div>
</div>
</body>
</html>
