<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1600px;
    height: 1200px;
    background: #080808;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Grid lines */
  .grid-line {
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: #1C1C1C;
  }

  /* Glow */
  .glow {
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,216,50,0.06) 0%, transparent 65%);
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 5px;
    background: #E8D832;
  }

  /* Main layout */
  .content {
    position: absolute;
    inset: 0;
    padding: 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 42px;
    letter-spacing: -1.5px;
    color: #EDEAE3;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .logo .arrow { color: #E8D832; }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #E8D832;
    background: rgba(232,216,50,0.08);
    border: 1px solid rgba(232,216,50,0.2);
    padding: 10px 22px;
    border-radius: 100px;
  }

  /* Hero text */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0 40px;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #383838;
    margin-bottom: 32px;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 148px;
    line-height: 0.88;
    letter-spacing: -6px;
    color: #EDEAE3;
    margin-bottom: 16px;
  }
  .title .yellow { color: #E8D832; }

  .subtitle {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 32px;
    color: #444444;
    letter-spacing: -0.3px;
    margin-top: 32px;
  }

  /* Pipeline */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 48px 0;
  }

  .stage {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .stage-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #E8D832;
    background: rgba(232,216,50,0.08);
    border: 1px solid rgba(232,216,50,0.2);
    padding: 12px 24px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .arrow-sep {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: #383838;
    padding: 0 16px;
  }

  /* Bottom stats */
  .stats {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-top: 1px solid #1C1C1C;
    padding-top: 48px;
  }

  .stat-group {
    display: flex;
    gap: 56px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 56px;
    color: #E8D832;
    letter-spacing: -2px;
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #383838;
  }

  .price-block {
    text-align: right;
  }

  .price {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 72px;
    color: #EDEAE3;
    letter-spacing: -3px;
    line-height: 1;
  }

  .price-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #383838;
    margin-top: 6px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, #E8D832 0%, transparent 60%);
  }
</style>
</head>
<body>

  <!-- Grid lines -->
  <div class="grid-line" style="left: 400px;"></div>
  <div class="grid-line" style="left: 800px;"></div>
  <div class="grid-line" style="left: 1200px;"></div>

  <!-- Glow -->
  <div class="glow"></div>

  <!-- Top bar -->
  <div class="top-bar"></div>

  <!-- Content -->
  <div class="content">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="arrow">▸</span>ARABA
      </div>
      <div class="badge">Web Agency Kit</div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="label">Model Workspace Protocol</div>
      <div class="title">
        Brief to<br />
        <span class="yellow">handoff.</span>
      </div>
      <div class="subtitle">AI-powered client pipeline for one-person web agencies</div>

      <!-- Pipeline -->
      <div class="pipeline">
        <div class="stage">
          <div class="stage-pill">Brief</div>
          <div class="arrow-sep">→</div>
        </div>
        <div class="stage">
          <div class="stage-pill">Proposal</div>
          <div class="arrow-sep">→</div>
        </div>
        <div class="stage">
          <div class="stage-pill">Sitemap</div>
          <div class="arrow-sep">→</div>
        </div>
        <div class="stage">
          <div class="stage-pill">Copy</div>
          <div class="arrow-sep">→</div>
        </div>
        <div class="stage">
          <div class="stage-pill">Build</div>
          <div class="arrow-sep">→</div>
        </div>
        <div class="stage">
          <div class="stage-pill">Handoff</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-group">
        <div class="stat">
          <div class="stat-value">13</div>
          <div class="stat-label">Files</div>
        </div>
        <div class="stat">
          <div class="stat-value">6</div>
          <div class="stat-label">AI Prompts</div>
        </div>
        <div class="stat">
          <div class="stat-value">4</div>
          <div class="stat-label">Templates</div>
        </div>
        <div class="stat">
          <div class="stat-value">48h</div>
          <div class="stat-label">Delivery</div>
        </div>
      </div>
      <div class="price-block">
        <div class="price">£49.99</div>
        <div class="price-label">One-time · Instant download</div>
      </div>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar"></div>

</body>
</html>
