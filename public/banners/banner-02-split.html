<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #080808;
  }

  .banner {
    width: 1500px;
    height: 500px;
    display: grid;
    grid-template-columns: 1fr 480px;
    overflow: hidden;
    position: relative;
  }

  /* Left panel */
  .left {
    background: #080808;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .left::after {
    content: '';
    position: absolute;
    right: 0;
    top: 60px;
    bottom: 60px;
    width: 1px;
    background: #1C1C1C;
  }

  /* Grain */
  .left::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #E8D832;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 76px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: #EDEAE3;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .sub {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    color: #555555;
    line-height: 1.6;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  .sub span {
    color: #888888;
  }

  /* Right panel — yellow */
  .right {
    background: #E8D832;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 52px;
    position: relative;
    overflow: hidden;
  }

  /* Big number decoration */
  .right::before {
    content: 'AI';
    position: absolute;
    bottom: -20px;
    right: -10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 200px;
    line-height: 1;
    color: rgba(8,8,8,0.06);
    letter-spacing: -0.05em;
    pointer-events: none;
  }

  .right-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(8,8,8,0.4);
  }

  .right-headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #080808;
  }

  .right-sub {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: rgba(8,8,8,0.55);
    line-height: 1.5;
  }

  .handle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(8,8,8,0.5);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(8,8,8,0.2);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="label">— Actionable AI Series</div>
    <div class="headline">
      MSc Data Scientist.<br>Building real<br>AI systems.
    </div>
    <div class="sub">
      <span>Python · LangChain · n8n · OpenAI API</span><br>
      Helping business owners automate with AI.
    </div>
  </div>

  <div class="right">
    <div class="right-label">Creator · Educator · Builder</div>
    <div>
      <div class="right-headline">I Build It.<br>I Teach It.</div>
    </div>
    <div class="right-sub">Weekly systems, tutorials,<br>and real automation builds.</div>
    <div class="handle-row">
      <div class="handle">@Olurabian</div>
      <div class="dot"></div>
    </div>
  </div>
</div>
</body>
</html>
